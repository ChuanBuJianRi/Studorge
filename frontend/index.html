<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studorge</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="icon" type="image/png" href="/static/app-icon.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #08090d;
            --bg-secondary: #0c0e16;
            --bg-tertiary: #111420;
            --bg-card: #161826;
            --bg-hover: #1c1f2e;
            --bg-active: rgba(45, 212, 191, 0.08);
            --border: rgba(255,255,255,0.05);
            --border-light: rgba(255,255,255,0.09);
            --text-primary: #eef0f5;
            --text-secondary: #8890a8;
            --text-tertiary: #4e5368;
            --accent: #2dd4bf;
            --accent-light: #5eead4;
            --accent-dim: #1a9e8e;
            --accent-glow: rgba(45, 212, 191, 0.18);
            --warm: #f4a261;
            --red: #f87171;
            --green: #4ade80;
            --shadow-lg: 0 24px 64px rgba(0,0,0,0.6);
            --radius: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════ SIDEBAR ═══════════════════ */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            min-height: 0;
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            padding: 18px 16px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding: 10px 12px;
            margin-left: -6px;
            margin-right: -6px;
            border-radius: var(--radius-lg);
            background: linear-gradient(155deg, rgba(255,255,255,0.028) 0%, rgba(255,255,255,0.01) 45%, rgba(45,212,191,0.025) 100%);
            border: 1px solid rgba(255,255,255,0.045);
            box-shadow: 0 1px 0 rgba(255,255,255,0.025) inset, 0 12px 36px -28px rgba(0,0,0,0.85);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.07);
        }
        .logo-icon svg,
        .logo-icon img { width: 100%; height: 100%; display: block; object-fit: cover; }

        .logo-text { display: flex; flex-direction: column; gap: 0; min-width: 0; flex: 1; }
        .logo h1.logo-wordmark {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.055em;
            line-height: 1.05;
            margin: 0;
            color: var(--text-primary);
        }
        .logo-wordmark .wm-base { color: var(--text-primary); }
        .logo-wordmark .wm-accent {
            background: linear-gradient(118deg, #9a6b78 0%, #5c7d8f 46%, #8a7d58 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-wordmark::after {
            content: '';
            display: block;
            width: 36px;
            height: 2px;
            margin-top: 6px;
            border-radius: 2px;
            background: linear-gradient(90deg, rgba(180,95,105,0.55), rgba(80,115,145,0.5), rgba(145,125,75,0.5));
            opacity: 0.55;
        }
        .new-topic-row { display: flex; gap: 7px; }

        .input-base {
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }
        .input-base:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 2px var(--accent-glow); }
        .input-base::placeholder { color: var(--text-tertiary); }
        .new-topic-row .input-base { flex: 1; }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent-dim); color: #041210; font-weight: 600; }
        .btn-primary:hover { background: var(--accent); }
        .btn-ghost { background: var(--bg-hover); color: var(--text-secondary); border: 1px solid var(--border-light); }
        .btn-ghost:hover { background: var(--bg-card); color: var(--text-primary); }
        .btn-danger { background: rgba(248,113,113,0.08); color: var(--red); border: 1px solid rgba(248,113,113,0.15); }
        .btn-danger:hover { background: rgba(248,113,113,0.15); }
        .btn-small { padding: 5px 10px; font-size: 11px; border-radius: 6px; }

        /* Topic list */
        .topic-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px;
        }

        .topic-list-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-tertiary);
            padding: 6px 8px 8px;
        }

        .topic-item {
            padding: 9px 10px;
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.15s;
            position: relative;
            user-select: none;
        }
        .topic-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .topic-item.active { background: var(--bg-active); color: var(--accent-light); }
        .topic-item.active::before {
            content: '';
            position: absolute;
            left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 16px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }

        .topic-icon {
            width: 22px; height: 22px;
            border-radius: 6px;
            background: var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }
        .topic-item.active .topic-icon { background: rgba(45,212,191,0.12); }

        .topic-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .topic-expand-btn {
            background: none; border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 9px;
            padding: 3px;
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
            line-height: 1;
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .topic-expand-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .topic-expand-btn.expanded { transform: rotate(90deg); }

        .topic-delete-btn {
            opacity: 0;
            background: none; border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.15s;
            line-height: 1;
            flex-shrink: 0;
        }
        .topic-item:hover .topic-delete-btn { opacity: 1; }
        .topic-delete-btn:hover { color: var(--red); }

        .topic-children { overflow: hidden; }

        /* Sub-topics indented */
        .topic-item.sub-topic {
            font-size: 11.5px;
            color: var(--text-tertiary);
        }
        .topic-item.sub-topic:hover { color: var(--text-secondary); }
        .topic-item.sub-topic.sub-active { color: var(--accent); background: var(--bg-active); }

        /* RAG section */
        .rag-section {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .rag-section .section-label {
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-tertiary); margin-bottom: 7px;
        }
        .rag-input-row { display: flex; gap: 5px; }
        .rag-input-row .input-base { flex: 1; padding: 6px 10px; }

        /* ═══════════════════ MAIN ═══════════════════ */
        .main {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
            position: relative;
        }

        .btn-settings {
            position: absolute; top: 10px; right: 14px; z-index: 20;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 7px;
            font-size: 11px; font-weight: 500; font-family: inherit;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-settings:hover { background: var(--bg-hover); color: var(--text-secondary); border-color: var(--accent-dim); }

        .tab-bar {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 18px;
            gap: 2px;
            flex-shrink: 0;
        }
        .tab-btn {
            padding: 11px 16px;
            background: none; border: none;
            color: var(--text-tertiary);
            cursor: pointer; font-size: 12px; font-weight: 500;
            font-family: inherit;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* Panels */
        .content { flex: 1; min-height: 0; display: flex; overflow: hidden; }
        .panel { display: none; flex: 1; min-width: 0; min-height: 0; flex-direction: column; }
        .panel.active { display: flex; }

        /* ═══════════════════ CHAT PANEL ═══════════════════ */
        .chat-panel {
            display: flex; flex-direction: column;
            flex: 1; min-height: 0; overflow: hidden;
        }

        .chat-messages {
            flex: 1; min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 28px 28px 8px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .message-group { max-width: 740px; width: 100%; margin: 0 auto; }

        .message-user-wrap { display: flex; justify-content: flex-end; margin-bottom: 8px; }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.75;
        }

        .message-user {
            background: linear-gradient(135deg, var(--accent-dim), #0f7a6e);
            color: #e0faf7;
            border-radius: var(--radius) var(--radius) 4px var(--radius);
            max-width: 72%;
            font-size: 13.5px;
        }

        .message-ai {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            position: relative;
        }

        .message-ai-label { display: none; }

        .message-ai pre {
            background: var(--bg-primary);
            padding: 12px; border-radius: 8px;
            overflow-x: auto; margin: 8px 0;
            border: 1px solid var(--border);
        }
        .message-ai code { font-family: 'SF Mono','JetBrains Mono','Fira Code',monospace; font-size: 12.5px; }
        .message-ai p { margin: 6px 0; }
        .message-ai p:first-child { margin-top: 0; }
        .message-ai p:last-child { margin-bottom: 0; }
        .message-ai ul, .message-ai ol { padding-left: 20px; margin: 6px 0; }
        .message-ai li { margin: 3px 0; }
        .message-ai h1,.message-ai h2,.message-ai h3,.message-ai h4 { margin: 14px 0 6px; }
        .message-ai strong { color: var(--accent-light); }
        .message-ai blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); }
        .message-ai table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
        .message-ai th,.message-ai td { border: 1px solid var(--border-light); padding: 6px 10px; }
        .message-ai th { background: var(--bg-tertiary); color: var(--text-primary); }

        /* Message actions row */
        .message-actions {
            display: flex; align-items: center; gap: 8px;
            margin-top: 10px; padding-top: 8px;
            border-top: 1px solid var(--border);
            opacity: 0; transition: opacity 0.15s;
        }
        .message-ai:hover .message-actions { opacity: 1; }
        .action-btn {
            background: none; border: none;
            color: var(--text-tertiary);
            cursor: pointer; font-size: 11px;
            padding: 3px 7px; border-radius: 5px;
            transition: all 0.15s; display: flex; align-items: center; gap: 4px;
        }
        .action-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
        .action-btn svg { width: 12px; height: 12px; }

        /* ═══════════════════ THINKING ANIMATION ═══════════════════ */
        .thinking-indicator {
            display: flex; align-items: center; gap: 10px;
            padding: 4px 0;
        }
        .thinking-orb {
            width: 20px; height: 20px;
            border-radius: 50%;
            position: relative; flex-shrink: 0;
        }
        .thinking-orb::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent) 0%, var(--accent-glow) 40%, transparent 60%, var(--accent) 100%);
            animation: thinkSpin 1s linear infinite;
        }
        .thinking-orb::after {
            content: '';
            position: absolute; inset: 3px;
            border-radius: 50%;
            background: var(--bg-card);
        }
        @keyframes thinkSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .thinking-text {
            font-size: 13px; color: var(--text-tertiary);
            animation: thinkPulse 1.4s ease-in-out infinite;
        }
        @keyframes thinkPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* Streaming cursor */
        .stream-cursor {
            display: inline-block;
            width: 2px; height: 1em;
            background: var(--accent);
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: cursorBlink 0.65s step-end infinite;
        }
        @keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        /* Live markdown during streaming */
        .stream-live-md {
            font-size: 13.5px;
            line-height: 1.75;
            color: var(--text-secondary);
        }
        .stream-live-md > *:last-child::after {
            content: '';
            display: inline-block;
            width: 2px; height: 0.9em;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 0.65s step-end infinite;
            border-radius: 1px;
        }

        /* Chat node: flash 3 times then stop */
        @keyframes nodeFlash {
            0%, 100% { box-shadow: none; }
            50%      { box-shadow: 0 0 0 3px rgba(45,212,191,1), 0 0 20px rgba(45,212,191,0.55), 0 0 40px rgba(45,212,191,0.2); }
        }
        .node-flash {
            animation: nodeFlash 0.6s ease-in-out 3;
            border-radius: 10px;
        }

        /* Knowledge tree: current node persistent pulse ring */
        @keyframes treePulse {
            0%, 100% { stroke-opacity: 0.35; }
            50%      { stroke-opacity: 1; }
        }
        .tree-pulse-ring { animation: treePulse 1.4s ease-in-out infinite; }

        /* ═══════════════════ CHAT INPUT ═══════════════════ */
        .chat-input-area {
            flex-shrink: 0;
            padding: 12px 28px 20px;
            max-width: 820px; width: 100%; margin: 0 auto;
        }

        .input-wrap { position: relative; }

        .input-wrap textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 13.5px;
            resize: none; outline: none; font-family: inherit;
            min-height: 44px; max-height: 140px; line-height: 1.5;
            transition: all 0.2s;
        }
        .input-wrap textarea:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 2px var(--accent-glow); }
        .input-wrap textarea::placeholder { color: var(--text-tertiary); }

        .input-toolbar {
            display: flex; align-items: center; gap: 8px;
            margin-top: 8px;
        }

        .btn-icon {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: var(--bg-hover);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .btn-icon:hover { background: var(--bg-card); color: var(--text-primary); }
        .btn-icon svg { width: 16px; height: 16px; }

        .btn-icon.active-file { color: var(--accent); border-color: var(--accent-dim); }

        .btn-voice { position: relative; }
        .btn-voice.recording {
            color: var(--red);
            border-color: rgba(248,113,113,0.3);
            background: rgba(248,113,113,0.06);
        }
        .btn-voice.recording::after {
            content: '';
            position: absolute; inset: -4px;
            border-radius: 12px;
            border: 2px solid var(--red);
            animation: recordRing 1s ease-out infinite;
            opacity: 0;
        }
        @keyframes recordRing { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.5); opacity: 0; } }

        .file-badge {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 10px;
            background: var(--bg-hover);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-size: 11px; color: var(--text-secondary);
            max-width: 160px;
        }
        .file-badge-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-remove {
            background: none; border: none; cursor: pointer;
            color: var(--text-tertiary); font-size: 14px; line-height: 1;
            flex-shrink: 0;
        }
        .file-remove:hover { color: var(--red); }

        /* Image preview badge */
        .img-preview-badge {
            display: flex; align-items: center; gap: 6px;
            background: var(--bg-hover);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 3px 8px 3px 3px;
            flex-shrink: 0;
        }
        .img-preview-badge img {
            width: 34px; height: 34px;
            object-fit: cover; border-radius: 7px;
            display: block;
        }
        .img-preview-badge span {
            font-size: 11px; color: var(--text-secondary);
            max-width: 90px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }

        /* Image in message bubble */
        .msg-image {
            max-width: 280px; max-height: 220px;
            border-radius: 8px; display: block;
            margin-bottom: 8px; object-fit: cover;
            cursor: pointer; transition: opacity 0.15s;
        }
        .msg-image:hover { opacity: 0.88; }

        /* Lightbox */
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: none;
            align-items: center; justify-content: center;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 92vw; max-height: 88vh;
            border-radius: 10px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.8);
        }

        .input-spacer { flex: 1; }

        /* Response length segmented control */
        .resp-len-ctrl {
            display: flex; align-items: center; gap: 0;
            border: 1px solid var(--border-light); border-radius: 7px;
            overflow: hidden; flex-shrink: 0;
        }
        .resp-len-btn {
            background: none; border: none; border-right: 1px solid var(--border-light);
            color: var(--text-tertiary); font-size: 10.5px; font-family: inherit;
            padding: 4px 9px; cursor: pointer; transition: all 0.15s;
            white-space: nowrap; line-height: 1.4;
        }
        .resp-len-btn:last-child { border-right: none; }
        .resp-len-btn:hover { color: var(--text-secondary); background: var(--bg-hover); }
        .resp-len-btn.active {
            background: var(--accent-dim); color: #041210; font-weight: 600;
        }

        .btn-send {
            height: 34px; padding: 0 18px;
            background: var(--accent-dim); color: #041210;
            border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-send:hover { background: var(--accent); }

        /* ═══════════════════ TREE PANEL ═══════════════════ */
        .tree-panel {
            flex: 1; min-height: 0;
            position: relative; overflow: hidden;
            background: var(--bg-primary);
        }
        .tree-svg { width: 100%; height: 100%; cursor: grab; }
        .tree-svg:active { cursor: grabbing; }
        .tree-node { cursor: pointer; }
        .tree-node rect { transition: filter 0.15s ease; }
        .tree-node:hover rect { filter: brightness(1.3); }
        .tree-node text { pointer-events: none; }
        .tree-link { fill: none; stroke-width: 1.5; }
        /* Mini reset button */
        .tree-reset-btn {
            position: absolute; bottom: 16px; right: 16px;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 7px;
            color: var(--text-tertiary);
            font-size: 11px; font-family: inherit; cursor: pointer;
            transition: all 0.2s;
        }
        .tree-reset-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

        /* ═══════════════════ BREADCRUMB ═══════════════════ */
        .breadcrumb-bar {
            display: none; align-items: center; gap: 2px;
            padding: 6px 18px; flex-shrink: 0;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap; min-height: 34px;
        }
        .breadcrumb-item {
            background: none; border: none;
            color: var(--text-tertiary); font-size: 11.5px;
            cursor: pointer; padding: 2px 7px; border-radius: 5px;
            font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .breadcrumb-item:hover { color: var(--accent); background: var(--bg-hover); }
        .breadcrumb-sep { color: var(--text-tertiary); font-size: 11px; user-select: none; }
        .breadcrumb-current {
            font-size: 11.5px; color: var(--text-secondary);
            font-weight: 500; padding: 2px 7px;
        }

        /* ═══════════════════ PANEL RESIZE HANDLE ═══════════════════ */
        .panel-resize-handle {
            width: 5px;
            flex-shrink: 0;
            cursor: col-resize;
            background: transparent;
            display: none;              /* shown via JS when sub-panel is open */
            position: relative;
            z-index: 15;
            transition: background 0.15s;
        }
        .panel-resize-handle::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            left: 2px;
            width: 1px;
            background: var(--border);
            transition: background 0.15s, width 0.15s, left 0.15s;
        }
        .panel-resize-handle:hover::after,
        .panel-resize-handle.dragging::after {
            background: var(--accent);
            width: 3px;
            left: 1px;
        }

        /* ═══════════════════ SUB-PANEL (right) ═══════════════════ */
        .sub-panel {
            width: 340px;
            flex-shrink: 0;
            display: none;
            flex-direction: column;
            border-left: 1px solid var(--border);
            background: var(--bg-secondary);
            min-height: 0;
            overflow: hidden;
        }
        .sub-panel.open { display: flex; }

        .sub-panel-header {
            border-bottom: 1px solid var(--border);
            display: flex; align-items: flex-end;
            flex-shrink: 0; background: var(--bg-tertiary);
            min-height: 46px;
        }

        /* Child topic tabs */
        .child-tabs-row {
            display: flex; gap: 2px;
            padding: 8px 8px 0; flex: 1; min-width: 0;
            overflow-x: auto;
        }
        .child-tabs-row::-webkit-scrollbar { height: 0; }
        .child-tab {
            padding: 5px 11px; border-radius: 6px 6px 0 0;
            font-size: 11px; cursor: pointer; color: var(--text-tertiary);
            background: none; border: 1px solid transparent; border-bottom: none;
            white-space: nowrap; font-family: inherit; transition: all 0.15s;
            flex-shrink: 0; max-width: 120px;
            overflow: hidden; text-overflow: ellipsis;
        }
        .child-tab:hover { color: var(--text-secondary); background: var(--bg-hover); }
        .child-tab.active {
            color: var(--accent-light); background: var(--bg-secondary);
            border-color: var(--border-light);
        }
        .child-tab-add {
            background: none; border: none; cursor: pointer;
            color: var(--text-tertiary); padding: 5px 8px; font-size: 16px;
            border-radius: 6px; flex-shrink: 0; align-self: flex-end;
            font-family: inherit; transition: all 0.15s;
        }
        .child-tab-add:hover { color: var(--accent); background: var(--bg-hover); }

        .sub-panel-header-actions {
            display: flex; align-items: center; gap: 5px;
            padding: 0 10px 6px 4px; flex-shrink: 0;
        }
        .btn-navigate-in {
            padding: 4px 10px;
            background: var(--accent-dim); color: #041210;
            border: none; border-radius: 6px;
            font-size: 11px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .btn-navigate-in:hover { background: var(--accent); }
        .sub-panel-close {
            background: none; border: none;
            color: var(--text-tertiary); cursor: pointer;
            font-size: 16px; line-height: 1;
            padding: 3px 5px; border-radius: 4px; transition: all 0.15s;
            flex-shrink: 0;
        }
        .sub-panel-close:hover { color: var(--text-primary); background: var(--bg-hover); }

        .sub-panel-messages {
            flex: 1; min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 14px;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Condensed messages */
        .sub-panel-messages .message-group { max-width: 100%; }
        .sub-panel-messages .message { padding: 9px 12px; font-size: 12.5px; }
        .sub-panel-messages .message-user { max-width: 85%; font-size: 12px; }
        .sub-panel-messages .message-ai { font-size: 12.5px; }
        .sub-panel-messages .message-ai pre { padding: 8px; font-size: 11.5px; }
        .sub-panel-messages .message-actions { display: none; }

        .sub-panel-input {
            flex-shrink: 0;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            display: flex; gap: 7px; align-items: flex-end;
        }
        .sub-panel-input textarea {
            flex: 1;
            padding: 8px 11px;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 12.5px;
            resize: none; outline: none; font-family: inherit;
            min-height: 36px; max-height: 90px; line-height: 1.45;
            transition: all 0.2s;
        }
        .sub-panel-input textarea:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 2px var(--accent-glow); }
        .sub-panel-input textarea::placeholder { color: var(--text-tertiary); }
        .sub-send { height: 36px; padding: 0 14px; font-size: 12px; }

        /* ═══════════════════ DEEP DIVE TOOLTIP ═══════════════════ */
        .deep-dive-tooltip {
            position: fixed;
            background: linear-gradient(135deg, var(--accent-dim), #0d7a6b);
            color: #e0faf7;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px; font-weight: 600;
            cursor: pointer; display: none; z-index: 1000;
            box-shadow: 0 6px 20px rgba(45,212,191,0.3);
            user-select: none;
        }
        .deep-dive-tooltip:hover { filter: brightness(1.1); }

        /* ═══════════════════ MODALS ═══════════════════ */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 99; display: none;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%,-47%); }
            to   { opacity: 1; transform: translate(-50%,-50%); }
        }
        .modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 24px;
            max-width: 580px; width: 92%; max-height: 80vh;
            overflow-y: auto; z-index: 100; display: none;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.2s ease;
        }
        .modal h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; }
        .modal .answer-content,.modal .rag-answer { line-height: 1.75; font-size: 13.5px; color: var(--text-secondary); }
        .modal .answer-content pre,.modal .rag-answer pre { background: var(--bg-primary); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; border: 1px solid var(--border); }
        .modal-actions { margin-top: 16px; display: flex; justify-content: flex-end; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border); }

        .rag-sources { font-size: 11.5px; color: var(--text-tertiary); margin-top: 14px; }
        .rag-source-item { background: var(--bg-primary); padding: 8px 12px; border-radius: 8px; margin-top: 6px; border: 1px solid var(--border); }

        /* Settings form */
        .settings-form { display: flex; flex-direction: column; gap: 14px; }
        .settings-field { display: flex; flex-direction: column; gap: 5px; }
        .settings-field label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; }
        .settings-field .input-base { font-size: 13px; padding: 9px 12px; }
        .settings-field select.input-base { cursor: pointer; }
        .settings-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
        .settings-status { font-size: 12px; padding: 4px 0; }
        .settings-status.success { color: var(--green); }
        .settings-status.error { color: var(--red); }

        /* Empty state */
        .empty-state {
            display: flex; align-items: center; justify-content: center;
            height: 100%; flex-direction: column; gap: 12px; padding: 40px;
        }
        .empty-state h2 { font-size: 16px; font-weight: 600; }
        .empty-state p { font-size: 13px; color: var(--text-tertiary); text-align: center; max-width: 280px; line-height: 1.6; }

        /* Loading dots (legacy for RAG) */
        .loading-dots { display: inline-flex; gap: 3px; align-items: center; }
        .loading-dots span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: ldBounce 1.1s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes ldBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-7px); opacity: 1; } }

        /* ═══════════════════ DRAG-DROP OVERLAY ═══════════════════ */
        .drop-overlay {
            position: absolute; inset: 0; z-index: 60;
            display: none; align-items: center; justify-content: center;
            pointer-events: none;
            border-radius: var(--radius-lg);
        }
        .drop-overlay.active { display: flex; }
        .drop-overlay::before {
            content: '';
            position: absolute; inset: 10px;
            border: 2px dashed var(--accent);
            border-radius: var(--radius-lg);
            background: rgba(45,212,191,0.05);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }
        .drop-overlay-inner {
            position: relative; z-index: 1;
            text-align: center; pointer-events: none;
        }
        .drop-overlay-icon {
            font-size: 44px; line-height: 1;
            margin-bottom: 12px; display: block;
            animation: dropIconFloat 1.2s ease-in-out infinite alternate;
        }
        @keyframes dropIconFloat {
            from { transform: translateY(0); }
            to   { transform: translateY(-8px); }
        }
        .drop-overlay-title {
            font-size: 16px; font-weight: 600;
            color: var(--accent-light); margin-bottom: 6px;
        }
        .drop-overlay-sub {
            font-size: 12px; color: var(--text-secondary);
            display: flex; gap: 10px; justify-content: center; align-items: center;
        }
        .drop-chip {
            padding: 3px 10px;
            background: rgba(45,212,191,0.1);
            border: 1px solid rgba(45,212,191,0.25);
            border-radius: 20px;
            font-size: 11px; color: var(--accent);
        }
        .drop-chip.warm {
            background: rgba(244,162,97,0.1);
            border-color: rgba(244,162,97,0.25);
            color: var(--warm);
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

        /* Ambient glows */
        .ambient { position: fixed; pointer-events: none; z-index: 0; border-radius: 50%; }
        .ambient-1 { top: -200px; right: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(45,212,191,0.03) 0%, transparent 65%); }
        .ambient-2 { bottom: -200px; left: 100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(244,162,97,0.02) 0%, transparent 65%); }
    </style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<!-- ══════════════ SIDEBAR ══════════════ -->
<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon">
                <img src="/static/app-icon.png" alt="" width="40" height="40" decoding="async">
            </div>

            </div>
        </div>

    </div>
    <div class="topic-list" id="topicList">

    </div>
    <div class="rag-section">
        <div class="section-label">知识库检索</div>

        </div>
    </div>
</div>

<!-- ══════════════ MAIN ══════════════ -->
<div class="main" id="mainArea">
    <!-- Drag-drop overlay -->
    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-overlay-inner">
            <span class="drop-overlay-icon">⬇︎</span>
            <div class="drop-overlay-title">释放以上传</div>
            <div class="drop-overlay-sub">
                <span class="drop-chip warm">图片 JPG / PNG / WebP</span>
                <span class="drop-chip">文档 PDF / TXT / MD</span>
            </div>
        </div>
    </div>

    <button class="btn-settings" onclick="openSettings()">API 设置</button>

    <div class="breadcrumb-bar" id="breadcrumbBar"></div>
    <div class="tab-bar" id="tabBar" style="display:none;">
        <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">学习对话</button>
        <button class="tab-btn" data-tab="tree" onclick="switchTab('tree')">知识树</button>
    </div>
    <div class="content">
        <div class="panel active" id="panelChat">
            <div class="chat-panel">
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <h2>开始你的学习旅程</h2>

                </div>
                <div class="chat-input-area" id="chatInputArea" style="display:none;">

                            <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.pdf" onchange="handleFileSelect(this)">

                        <label class="btn-icon" id="imgUploadBtn" title="上传图片">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <input type="file" id="imageInput" style="display:none" accept="image/*" onchange="handleImageSelect(this)">
                        </label>
                        <button class="btn-icon btn-voice" id="voiceBtn" title="语音输入" onclick="toggleVoice()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                        <div class="file-badge" id="fileBadge" style="display:none;">
                            <span class="file-badge-name" id="fileNameLabel"></span>
                            <button class="file-remove" onclick="removeFile()">×</button>
                        </div>
                        <div class="img-preview-badge" id="imgPreviewBadge" style="display:none;">
                            <img id="imgPreviewThumb" src="" alt="预览">

                            <button class="file-remove" onclick="removeImage()">×</button>
                        </div>
                        <div class="input-spacer"></div>
                        <div class="resp-len-ctrl" id="respLenCtrl">

                            <button class="resp-len-btn" data-val="extend"         onclick="setRespLen('extend')">Extend</button>

                        </div>
                        <button class="btn-send" onclick="askQuestion()">发送 ↵</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="panel" id="panelTree">
            <div class="tree-panel">
                <svg class="tree-svg" id="treeSvg"></svg>

            </div>
        </div>
    </div>
</div>

<!-- ══════════════ PANEL RESIZE HANDLE ══════════════ -->
<div class="panel-resize-handle" id="panelResizeHandle" title="拖拽调整面板宽度"></div>

<!-- ══════════════ SUB PANEL ══════════════ -->
        <div class="sub-panel" id="subPanel">
          <div class="sub-panel-header">
            <!-- Child topic tab selector -->
            <div class="child-tabs-row" id="childTabs"></div>
            <div class="sub-panel-header-actions">

            </select>

<script>
// ═══════════════════════ STATE ═══════════════════════
let currentTopicId = null;
let currentTopicName = '';
let currentNodes = [];

// Navigation path: [{id, name}, …] root→current (last item = current)
let navPath = [];
// Children of current topic shown in right panel
let childTopics = [];
let activeChildId = null;
let activeChildName = '';
let subNodes = [];
// Tracks whether a "deep dive" selection originated from sub-panel
let deepDiveSourcePanel = 'main'; // 'main' | 'sub'

// Deprecated aliases kept for compat (use activeChildId instead)
let subTopicId = null;
let subTopicName = '';

let allTopics = [];
let expandedTopics = new Set();

let selectedNodeId = null;
let selectedText = '';

// Response length setting: 'normal' | 'extend' | 'extend_longer'
let responseLength = localStorage.getItem('responseLength') || 'normal';

let attachedFileText = null;
let attachedFileName = null;
let attachedImageUrl  = null;
let attachedImageName = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

let isAskingMain = false;
let isAskingSub = false;

// ═══════════════════════ HELPERS ═══════════════════════
// ═══════════════════════ RESPONSE LENGTH ═══════════════════════
function setRespLen(val) {
    responseLength = val;
    localStorage.setItem('responseLength', val);
    // Update all resp-len-ctrl buttons on the page
    document.querySelectorAll('.resp-len-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.val === val);
    });
}

// Apply saved preference on load
document.addEventListener('DOMContentLoaded', () => setRespLen(responseLength));

async function api(url, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
}

function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function renderMarkdown(text) {
    if (!text) return '';
    return marked.parse(text);
}

function renderLatex(el) {
    if (typeof renderMathInElement === 'function') {
        renderMathInElement(el, {
            delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false },
                { left: '\\(', right: '\\)', display: false },
                { left: '\\[', right: '\\]', display: true },
            ],
            throwOnError: false,
        });
    }
}

function thinkingHTML() {
    return `<div class="thinking-indicator">
        <div class="thinking-orb"></div>
        <span class="thinking-text">正在思考…</span>
    </div>`;
}

// ═══════════════════════ TOPICS ═══════════════════════
async function loadTopics() {
    allTopics = await api('/api/topics');
    renderTopicTree();
}

function renderTopicTree() {
    const list = document.getElementById('topicList');
    const rootTopics = allTopics.filter(t => !t.parent_id);
    const childMap = {};
    allTopics.forEach(t => {
        if (t.parent_id) {
            if (!childMap[t.parent_id]) childMap[t.parent_id] = [];
            childMap[t.parent_id].push(t);
        }
    });

    if (rootTopics.length === 0) {
        list.innerHTML = `<div class="topic-list-label">我的专题</div>
            <div style="padding:12px 10px;text-align:center;color:var(--text-tertiary);font-size:11.5px;">还没有专题，创建一个吧</div>`;
        return;
    }

    function renderNode(t, depth) {
        const isMain = t.id === currentTopicId;
        const isSub = t.id === activeChildId;
        const children = childMap[t.id] || [];
        const hasChildren = children.length > 0;
        const expanded = expandedTopics.has(t.id);
        const indent = 10 + depth * 14;

        const clickFn = depth === 0
            ? `selectTopic(${t.id}, '${t.name.replace(/'/g, "\\'")}')`
            : `makeTopicMain(${t.id})`;

        let html = `<div class="topic-item ${isMain ? 'active' : ''} ${depth > 0 ? 'sub-topic' : ''} ${isSub ? 'sub-active' : ''}"
                style="padding-left:${indent}px" onclick="${clickFn}">`;

        if (hasChildren) {
            html += `<button class="topic-expand-btn ${expanded ? 'expanded' : ''}"
                onclick="event.stopPropagation();toggleExpand(${t.id})">▶</button>`;
        } else {
            html += `<span class="topic-icon">${t.name.slice(0, 1).toUpperCase()}</span>`;
        }

        html += `<span class="topic-name">${escapeHtml(t.name)}</span>
            <button class="topic-delete-btn" onclick="event.stopPropagation();deleteTopic(${t.id})">×</button>
        </div>`;

        if (hasChildren && expanded) {
            children.forEach(child => { html += renderNode(child, depth + 1); });
        }
        return html;
    }

    list.innerHTML = '<div class="topic-list-label">我的专题</div>' +
        rootTopics.map(t => renderNode(t, 0)).join('');
}

function toggleExpand(topicId) {
    if (expandedTopics.has(topicId)) {
        expandedTopics.delete(topicId);
    } else {
        expandedTopics.add(topicId);
    }
    renderTopicTree();
}

async function createTopic(parentId = null, name = null) {
    if (!name) {
        const input = document.getElementById('newTopicInput');
        name = input.value.trim();
        if (!name) return null;
        input.value = '';
    }
    const topic = await api('/api/topics', 'POST', { name, parent_id: parentId });
    await loadTopics();
    return topic;
}

async function deleteTopic(id) {
    if (!confirm('确定删除此专题及其所有学习记录？')) return;
    await api(`/api/topics/${id}`, 'DELETE');
    if (currentTopicId === id) {
        currentTopicId = null; currentTopicName = '';
        currentNodes = [];
        showMainEmptyState();
        document.getElementById('chatInputArea').style.display = 'none';
        document.getElementById('tabBar').style.display = 'none';
    }
    if (activeChildId === id) closeSubPanel();
    // If deleted topic is in nav path, go back to root
    if (navPath.some(p => p.id === id)) {
        navPath = navPath.slice(0, navPath.findIndex(p => p.id === id));
        if (navPath.length > 0) {
            const last = navPath[navPath.length - 1];
            currentTopicId = last.id; currentTopicName = last.name;
        }
    }
    await loadTopics();
}

function showMainEmptyState() {
    document.getElementById('chatMessages').innerHTML = `
        <div class="empty-state">
            <h2>开始你的学习旅程</h2>
            <p>在左侧创建一个专题，然后开始提问。</p>
        </div>`;
}

async function selectTopic(id, name) {
    // Reset nav path to just this root topic
    navPath = [{ id, name }];
    currentTopicId = id;
    currentTopicName = name;
    activeChildId = null;
    activeChildName = '';
    subTopicId = id; subTopicName = name; // compat aliases
    selectedNodeId = null;

    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('chatInputArea').style.display = 'block';

    await loadTopics();
    const data = await api(`/api/topics/${id}/tree`);
    currentNodes = data.nodes;
    renderMainChat();
    renderBreadcrumb();
    await loadChildTopics(id);
}

// ═══════════════════════ NAVIGATION ═══════════════════════

// Render breadcrumb from navPath
function renderBreadcrumb() {
    const bar = document.getElementById('breadcrumbBar');
    if (!bar) return;
    if (navPath.length <= 1) {
        bar.style.display = 'none';
        return;
    }
    bar.style.display = 'flex';
    bar.innerHTML = navPath.map((item, i) => {
        if (i === navPath.length - 1) {
            return `<span class="breadcrumb-current">${escapeHtml(item.name)}</span>`;
        }
        return `<button class="breadcrumb-item" onclick="navigateBack(${i})">${escapeHtml(item.name)}</button><span class="breadcrumb-sep">›</span>`;
    }).join('');
}

// Navigate back to a specific position in the path (index into navPath)
async function navigateBack(index) {
    if (index < 0 || index >= navPath.length) return;
    const target = navPath[index];
    navPath = navPath.slice(0, index + 1);

    currentTopicId = target.id;
    currentTopicName = target.name;
    activeChildId = null;
    activeChildName = '';

    const data = await api(`/api/topics/${currentTopicId}/tree`);
    currentNodes = data.nodes;
    renderMainChat();
    renderBreadcrumb();
    await loadTopics();
    await loadChildTopics(currentTopicId);
}

// "进入 →": make the active child the new main topic
async function navigateInto() {
    if (!activeChildId) return;

    navPath.push({ id: activeChildId, name: activeChildName });
    currentTopicId = activeChildId;
    currentTopicName = activeChildName;
    activeChildId = null;
    activeChildName = '';

    const data = await api(`/api/topics/${currentTopicId}/tree`);
    currentNodes = data.nodes;
    renderMainChat();
    renderBreadcrumb();
    await loadTopics();
    await loadChildTopics(currentTopicId);
}

// Navigate to any topic by id (finds path, shows parent in main + target in sub)
async function navigateTo(topicId) {
    const path = findPathToTopic(topicId);
    if (!path || path.length === 0) return;

    if (path.length === 1) {
        await selectTopic(path[0].id, path[0].name);
        return;
    }

    // Parent becomes main, target becomes active child
    const parent = path[path.length - 2];
    const target = path[path.length - 1];

    navPath = path.slice(0, path.length - 1).map(t => ({ id: t.id, name: t.name }));
    currentTopicId = parent.id;
    currentTopicName = parent.name;
    activeChildId = null;
    activeChildName = '';

    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('chatInputArea').style.display = 'block';

    const data = await api(`/api/topics/${currentTopicId}/tree`);
    currentNodes = data.nodes;
    renderMainChat();
    renderBreadcrumb();
    await loadTopics();

    // Rebuild childTopics and select the target
    childTopics = allTopics.filter(t => t.parent_id === currentTopicId);
    renderChildTabs();
    if (childTopics.length > 0) {
        await switchChild(target.id, target.name);
    }
}

// Make a topic the main panel directly (used by tree node clicks)
async function makeTopicMain(topicId) {
    const path = findPathToTopic(topicId);
    if (!path || path.length === 0) return;

    navPath = path.map(t => ({ id: t.id, name: t.name }));
    currentTopicId = topicId;
    currentTopicName = path[path.length - 1].name;
    activeChildId = null;
    activeChildName = '';

    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('chatInputArea').style.display = 'block';

    const data = await api(`/api/topics/${currentTopicId}/tree`);
    currentNodes = data.nodes;
    renderMainChat();
    renderBreadcrumb();
    await loadTopics();
    await loadChildTopics(currentTopicId);
}

// Build the ancestor path from root to a given topic id
function findPathToTopic(targetId) {
    const path = [];
    let current = allTopics.find(t => t.id === targetId);
    while (current) {
        path.unshift(current);
        current = current.parent_id ? allTopics.find(t => t.id === current.parent_id) : null;
    }
    return path;
}

// ═══════════════════════ CHILD TOPICS (sub-panel) ═══════════════════════

// Load direct children of parentId and set up the right panel
async function loadChildTopics(parentId) {
    childTopics = allTopics.filter(t => t.parent_id === parentId);

    if (childTopics.length === 0) {
        // No children — hide sub-panel only if no active child
        if (!activeChildId) closeSubPanel();
        return;
    }

    // Prefer keeping the current active child if still valid
    let target = childTopics[0];
    if (activeChildId) {
        const existing = childTopics.find(t => t.id === activeChildId);
        if (existing) target = existing;
        else activeChildId = null;
    }

    renderChildTabs();
    await switchChild(target.id, target.name);
}

// Render the child topic tab bar
function renderChildTabs() {
    const container = document.getElementById('childTabs');
    if (!container) return;
    container.innerHTML = childTopics.map(t => {
        const label = t.name.length > 16 ? t.name.slice(0, 14) + '…' : t.name;
        return `<button class="child-tab${t.id === activeChildId ? ' active' : ''}"
            onclick="switchChild(${t.id}, ${JSON.stringify(t.name)})"
            title="${escapeHtml(t.name)}">${escapeHtml(label)}</button>`;
    }).join('') + `<button class="child-tab-add" onclick="createChildTopic()" title="新建子专题">+</button>`;
}

// Switch to a different child topic in the right panel
async function switchChild(id, name) {
    activeChildId = id;
    activeChildName = name;
    subTopicId = id; subTopicName = name; // compat

    document.getElementById('subPanel').classList.add('open');
    document.getElementById('panelResizeHandle').style.display = 'block';
    renderChildTabs(); // refresh active state

    const data = await api(`/api/topics/${id}/tree`);
    subNodes = data.nodes;
    renderSubChat();
}

// Create a new child topic under current topic
async function createChildTopic() {
    const name = prompt('新子专题名称:');
    if (!name || !name.trim()) return;
    const topic = await api('/api/topics', 'POST', { name: name.trim(), parent_id: currentTopicId });
    await loadTopics();
    childTopics = allTopics.filter(t => t.parent_id === currentTopicId);
    renderChildTabs();
    await switchChild(topic.id, topic.name);
}

// Close the right panel
function closeSubPanel() {
    activeChildId = null;
    activeChildName = '';
    subTopicId = null; subTopicName = '';
    subNodes = [];
    document.getElementById('subPanel').classList.remove('open');
    document.getElementById('panelResizeHandle').style.display = 'none';
    renderChildTabs && renderChildTabs();
}

// Legacy alias kept for any remaining calls
async function openSubPanel(topicId, topicName) {
    await makeTopicMain(topicId);
}

// ═══════════════════════ STREAMING ASK ═══════════════════════
async function streamAsk(topicId, question, container, nodesList, onDone, imageUrl = null) {
    if (container.querySelector('.empty-state')) container.innerHTML = '';

    const msgId = 'msg-' + Date.now();
    const imgHtml = imageUrl
        ? `<img src="${imageUrl}" class="msg-image" alt="图片" onclick="openLightbox(this.src)"><br>`
        : '';
    container.insertAdjacentHTML('beforeend', `
        <div class="message-group" id="${msgId}">
            <div class="message-user-wrap">
                <div class="message message-user">${imgHtml}${escapeHtml(question)}</div>
            </div>
            <div class="message message-ai" id="${msgId}-ai">
                <div class="message-ai-label">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg> AI
                </div>
                ${thinkingHTML()}
            </div>
        </div>`);
    container.scrollTop = container.scrollHeight;

    const aiEl = document.getElementById(`${msgId}-ai`);
    let rawAnswer = '';
    let isThinking = true;
    let streamWrapEl = null;
    let _rafId = null;

    const flushMd = () => {
        _rafId = null;
        if (!streamWrapEl) return;
        try { streamWrapEl.innerHTML = marked.parse(rawAnswer); }
        catch { streamWrapEl.textContent = rawAnswer; }
        container.scrollTop = container.scrollHeight;
    };

    try {
        const payload = { topic_id: topicId, question, node_type: 'question', response_length: responseLength };
        if (imageUrl) payload.image_data_url = imageUrl;
        const resp = await fetch('/api/ask/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });

        if (!resp.ok) throw new Error(await resp.text());

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                let data;
                try { data = JSON.parse(line.slice(6)); } catch { continue; }

                if (data.error) {
                    aiEl.querySelector('.thinking-indicator')?.remove();
                    streamWrapEl?.remove();
                    aiEl.insertAdjacentHTML('beforeend', `<span style="color:var(--red)">请求失败: ${escapeHtml(data.error)}</span>`);
                    break;
                }

                if (data.token) {
                    if (isThinking) {
                        isThinking = false;
                        aiEl.querySelector('.thinking-indicator').remove();
                        aiEl.insertAdjacentHTML('beforeend', `<div class="stream-live-md" id="stream-wrap-${msgId}"></div>`);
                        streamWrapEl = document.getElementById(`stream-wrap-${msgId}`);
                    }
                    rawAnswer += data.token;
                    // throttle render to rAF (≈60fps max)
                    if (!_rafId) _rafId = requestAnimationFrame(flushMd);
                }

                if (data.done) {
                    if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
                    streamWrapEl?.remove();
                    streamWrapEl = null;
                    aiEl.insertAdjacentHTML('beforeend', renderMarkdown(rawAnswer));
                    aiEl.dataset.nodeId = data.node.id;
                    aiEl.insertAdjacentHTML('beforeend', `
                        <div class="message-actions">
                            <button class="action-btn" onclick="speakMessage(this)" data-text="${escapeHtml(rawAnswer)}" title="朗读">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
                                朗读
                            </button>
                            <button class="action-btn" onclick="copyText(this.dataset.t)" data-t="${escapeHtml(rawAnswer)}">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                                复制
                            </button>
                        </div>`);
                    renderLatex(aiEl);
                    container.scrollTop = container.scrollHeight;
                    nodesList.push(data.node);
                    if (onDone) onDone(data.node);
                }
            }
        }
    } catch (e) {
        if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
        if (aiEl) {
            aiEl.querySelector('.thinking-indicator')?.remove();
            streamWrapEl?.remove();
            aiEl.insertAdjacentHTML('beforeend', `<span style="color:var(--red)">请求失败: ${escapeHtml(e.message)}</span>`);
        }
    }
}

// ═══════════════════════ ASK MAIN ═══════════════════════
async function askQuestion() {
    if (isAskingMain) return;
    const input = document.getElementById('questionInput');
    let question = input.value.trim();
    if ((!question && !attachedImageUrl) || !currentTopicId) return;
    if (!question) question = '请描述一下这张图片中的内容。';

    if (attachedFileText) {
        question = `[请根据以下文件内容回答我的问题]\n文件名: ${attachedFileName}\n\n${attachedFileText}\n\n---\n我的问题: ${question}`;
    }

    const imgUrl = attachedImageUrl;
    input.value = ''; input.style.height = 'auto';
    removeFile();
    removeImage();
    isAskingMain = true;
    await streamAsk(currentTopicId, question, document.getElementById('chatMessages'), currentNodes, null, imgUrl);
    isAskingMain = false;
}

// ═══════════════════════ ASK SUB-PANEL ═══════════════════════
async function askInSubPanel() {
    if (isAskingSub || !activeChildId) return;
    const input = document.getElementById('subPanelInput');
    const question = input.value.trim();
    if (!question) return;
    input.value = ''; input.style.height = 'auto';
    isAskingSub = true;
    await streamAsk(activeChildId, question, document.getElementById('subPanelMessages'), subNodes);
    isAskingSub = false;
    // Refresh sub-nodes after answer
    const data = await api(`/api/topics/${activeChildId}/tree`);
    subNodes = data.nodes;
}

// ═══════════════════════ DEEP DIVE → SUB-TOPIC ═══════════════════════
// Track mousedown position to require a real drag before showing the deep-dive tooltip
let _ddMouseDownX = 0, _ddMouseDownY = 0;
document.addEventListener('mousedown', e => {
    _ddMouseDownX = e.clientX;
    _ddMouseDownY = e.clientY;
    // Hide tooltip immediately when clicking anywhere outside it
    const tooltip = document.getElementById('deepDiveTooltip');
    if (tooltip && !tooltip.contains(e.target)) {
        tooltip.style.display = 'none';
    }
});

document.addEventListener('mouseup', e => {
    const sel = window.getSelection();
    const text = sel?.toString().trim() || '';
    const tooltip = document.getElementById('deepDiveTooltip');

    // Require: text ≥ 5 chars, AND mouse moved ≥ 8px (real drag, not accidental click)
    const dx = Math.abs(e.clientX - _ddMouseDownX);
    const dy = Math.abs(e.clientY - _ddMouseDownY);
    const realDrag = dx > 8 || dy > 8;

    if (realDrag && text && text.length >= 5 && text.length < 400) {
        const anchor = sel.anchorNode?.parentElement?.closest?.('.message-ai');
        if (anchor) {
            selectedText = text;
            const nid = anchor.dataset.nodeId;
            if (nid) selectedNodeId = parseInt(nid);
            // Detect whether the selection is inside the sub-panel
            const inSub = !!sel.anchorNode?.parentElement?.closest?.('#subPanelMessages');
            deepDiveSourcePanel = inSub ? 'sub' : 'main';
            tooltip.style.left = e.pageX + 'px';
            tooltip.style.top = (e.pageY - 46) + 'px';
            tooltip.style.display = 'block';
            return;
        }
    }
    // No valid selection — hide tooltip (no delay needed since mousedown already hides it)
    tooltip.style.display = 'none';
});

async function deepDiveSelected() {
    document.getElementById('deepDiveTooltip').style.display = 'none';
    if (!currentTopicId) return;

    // AI-generated concise title for the sub-topic
    let subName;
    try {
        const r = await api('/api/generate-title', 'POST', { text: selectedText });
        subName = r.title || selectedText.slice(0, 15);
    } catch {
        subName = selectedText.slice(0, 15);
    }

    if (deepDiveSourcePanel === 'sub') {
        // Selection from right panel → new child goes under activeChildId
        if (!activeChildId) return;
        const parentId = activeChildId;
        const subTopic = await api('/api/topics', 'POST', { name: subName, parent_id: parentId, source_node_id: selectedNodeId || null });

        // Navigate into the active child (it becomes the new main)
        navPath.push({ id: activeChildId, name: activeChildName });
        currentTopicId = activeChildId;
        currentTopicName = activeChildName;
        activeChildId = null;
        activeChildName = '';

        const mainData = await api(`/api/topics/${currentTopicId}/tree`);
        currentNodes = mainData.nodes;
        renderMainChat();
        renderBreadcrumb();

        // Reload topics & children (newly created sub-topic should now be a child)
        await loadTopics();
        childTopics = allTopics.filter(t => t.parent_id === currentTopicId);
        renderChildTabs();
        await switchChild(subTopic.id, subTopic.name);

        // Auto-ask in the new child
        const q = `请详细解释: ${selectedText}`;
        isAskingSub = true;
        await streamAsk(subTopic.id, q, document.getElementById('subPanelMessages'), subNodes);
        isAskingSub = false;
    } else {
        // Selection from main panel → new child goes under currentTopicId
        const subTopic = await api('/api/topics', 'POST', { name: subName, parent_id: currentTopicId, source_node_id: selectedNodeId || null });
        expandedTopics.add(currentTopicId);
        await loadTopics();
        childTopics = allTopics.filter(t => t.parent_id === currentTopicId);
        renderChildTabs();
        await switchChild(subTopic.id, subTopic.name);

        const q = `请详细解释: ${selectedText}`;
        isAskingSub = true;
        await streamAsk(subTopic.id, q, document.getElementById('subPanelMessages'), subNodes);
        isAskingSub = false;
    }
}

async function deepDiveFromNode() {
    const nodeId    = selectedNodeId;
    const topicId   = selectedNodeTopicId;
    closeModals();

    if (!topicId) return;

    // Navigate to the topic that contains this node
    await makeTopicMain(topicId);
    switchTab('chat');

    // Wait for tab/panel to be visible, then scroll + flash 3x
    setTimeout(() => {
        const el = document.querySelector(`.message-ai[data-node-id="${nodeId}"]`);
        if (!el) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => {
            document.querySelectorAll('.node-flash').forEach(n => n.classList.remove('node-flash'));
            void el.offsetWidth;
            el.classList.add('node-flash');
            el.addEventListener('animationend', () => el.classList.remove('node-flash'), { once: true });
        }, 300);
    }, 120);
}

// ═══════════════════════ DRAG & DROP ═══════════════════════
let _dragCounter = 0;

function initDragDrop() {
    const zone = document.getElementById('mainArea');

    zone.addEventListener('dragenter', e => {
        if (!e.dataTransfer.types.includes('Files')) return;
        e.preventDefault();
        _dragCounter++;
        if (_dragCounter === 1) document.getElementById('dropOverlay').classList.add('active');
    });

    zone.addEventListener('dragover', e => {
        if (!e.dataTransfer.types.includes('Files')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
    });

    zone.addEventListener('dragleave', e => {
        _dragCounter--;
        if (_dragCounter <= 0) {
            _dragCounter = 0;
            document.getElementById('dropOverlay').classList.remove('active');
        }
    });

    zone.addEventListener('drop', e => {
        e.preventDefault();
        _dragCounter = 0;
        document.getElementById('dropOverlay').classList.remove('active');
        const files = e.dataTransfer.files;
        if (files.length === 0) return;
        // Process first file (could extend to multiple later)
        handleDroppedFile(files[0]);
    });
}

function handleDroppedFile(file) {
    const isImage = file.type.startsWith('image/');
    const isDoc = /\.(pdf|txt|md|markdown)$/i.test(file.name) ||
                  ['text/plain', 'text/markdown', 'application/pdf'].includes(file.type);

    if (isImage) {
        const reader = new FileReader();
        reader.onload = e => {
            attachedImageUrl  = e.target.result;
            attachedImageName = file.name;
            document.getElementById('imgPreviewThumb').src = attachedImageUrl;
            document.getElementById('imgPreviewName').textContent =
                file.name.length > 14 ? file.name.slice(0, 12) + '…' : file.name;
            document.getElementById('imgPreviewBadge').style.display = 'flex';
            document.getElementById('imgUploadBtn').classList.add('active-file');
            // Focus input so user can type a question
            document.getElementById('questionInput').focus();
        };
        reader.readAsDataURL(file);
        return;
    }

    if (isDoc) {
        const badge = document.getElementById('fileBadge');
        const nameEl = document.getElementById('fileNameLabel');
        nameEl.textContent = '上传中…';
        badge.style.display = 'flex';
        const formData = new FormData();
        formData.append('file', file);
        fetch('/api/upload', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                attachedFileText = data.text;
                attachedFileName = data.filename;
                nameEl.textContent = data.filename.length > 16 ? data.filename.slice(0, 14) + '…' : data.filename;
                document.getElementById('attachBtn').classList.add('active-file');
                document.getElementById('questionInput').focus();
            })
            .catch(err => {
                badge.style.display = 'none';
                alert('文件解析失败: ' + err.message);
            });
        return;
    }

    // Fallback: try reading as plain text
    const reader = new FileReader();
    reader.onload = e => {
        attachedFileText = e.target.result;
        attachedFileName = file.name;
        document.getElementById('fileNameLabel').textContent =
            file.name.length > 16 ? file.name.slice(0, 14) + '…' : file.name;
        document.getElementById('fileBadge').style.display = 'flex';
        document.getElementById('attachBtn').classList.add('active-file');
        document.getElementById('questionInput').focus();
    };
    reader.onerror = () => alert('不支持的文件格式，请上传图片或 PDF / TXT / MD 文档。');
    reader.readAsText(file);
}

// ═══════════════════════ VOICE INPUT ═══════════════════════
async function toggleVoice() {
    if (isRecording) {
        stopVoice();
    } else {
        await startVoice();
    }
}

async function startVoice() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : 'audio/webm';
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = sendAudioForTranscription;
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('voiceBtn').classList.add('recording');
        document.getElementById('voiceBtn').title = '点击停止录音';
    } catch (e) {
        alert('无法访问麦克风: ' + e.message);
    }
}

function stopVoice() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }
    isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceBtn').title = '语音输入';
}

async function sendAudioForTranscription() {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const formData = new FormData();
    formData.append('file', blob, 'recording.webm');
    const voiceBtn = document.getElementById('voiceBtn');
    voiceBtn.style.opacity = '0.5';
    try {
        const res = await fetch('/api/transcribe', { method: 'POST', body: formData });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const ta = document.getElementById('questionInput');
        ta.value += (ta.value ? ' ' : '') + data.text;
        ta.dispatchEvent(new Event('input'));
        ta.focus();
    } catch (e) {
        alert('语音识别失败: ' + e.message);
    } finally {
        voiceBtn.style.opacity = '1';
    }
}

let _treeZoom = null;
let _treeSvgSel = null;
let _treeInitTransform = null;
