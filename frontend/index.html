// Build D3-compatible hierarchy from full-tree API response
function buildFullTreeData(ft) {
    // Unified processor for both the root topic and any sub-topic level.
    // nodeType: 'node' for root level, 'subnode' for any nested level.
    function processLevel(data, nodeType) {
        // Build a flat map of all nodes at this level
        const nodeMap = {};
        data.nodes.forEach(n => {
            nodeMap[n.id] = {
                id: n.id,
                _type: nodeType,
                _label: n.title || n.question,
                _question: n.question,
                answer: n.answer,
                _topicId: n.topic_id,
                children: [],
            };
        });

        // Wire up node parent-child relationships (questions can have sub-questions)
        const nodeRoots = [];
        data.nodes.forEach(n => {
            if (n.parent_id && nodeMap[n.parent_id]) nodeMap[n.parent_id].children.push(nodeMap[n.id]);
            else nodeRoots.push(nodeMap[n.id]);
        });

        // Process sub-topics:
        // - if sub-topic has source_node_id → attach under that node
        // - otherwise → attach directly under this topic
        const directSubKids = [];
        data.subtopics.forEach(st => {
            const processed = processLevel(st, 'subnode');
            processed._type     = 'subtopic';
            processed._topicId  = st.topic.id;
            processed._label    = st.topic.name;
            processed.id        = `topic-${st.topic.id}`;

            const srcId = st.topic.source_node_id;
            if (srcId && nodeMap[srcId]) {
                nodeMap[srcId].children.push(processed);
            } else {
                directSubKids.push(processed);
            }
        });

        return {
            id: `topic-${data.topic.id}`,
            _type: nodeType === 'node' ? 'root' : 'subtopic',
            _topicId: data.topic.id,
            _label: data.topic.name,
            children: [...nodeRoots, ...directSubKids],
        };
    }

    return processLevel(ft, 'node');
}

async function renderTree() {
    const svgEl = document.getElementById('treeSvg');
    const svg = d3.select('#treeSvg');
    svg.selectAll('*').remove();
    document.getElementById('treeResetBtn').style.display = 'none';
    if (!currentTopicId) return;

    svg.append('text')
        .attr('x','50%').attr('y','50%').attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('fill','var(--text-tertiary)').attr('font-size','12px').attr('font-family','Inter,sans-serif')
        .text('加载中…');

    // Always render from root so sub-topics share the same tree
    const rootId = navPath.length > 0 ? navPath[0].id : currentTopicId;

    let ft;
    try {
        const res = await fetch(`/api/topics/${rootId}/full-tree`);
        if (!res.ok) throw new Error();
        ft = await res.json();
    } catch {
        svg.selectAll('text').text('加载失败，请重试');
        return;
    }

    svg.selectAll('*').remove();

    if (ft.nodes.length === 0 && ft.subtopics.length === 0) {
        svg.append('text')
            .attr('x','50%').attr('y','50%').attr('text-anchor','middle').attr('dominant-baseline','middle')
            .attr('fill','var(--text-tertiary)').attr('font-size','13px').attr('font-family','Inter,sans-serif')
            .text('暂无学习节点，开始提问后将在此展示知识树');
        return;
    }

    const treeData = buildFullTreeData(ft);
    const root = d3.hierarchy(treeData);

    // Adaptive node heights based on type
    const nodeH = d => d.data._type === 'root' ? 44 : d.data._type === 'subtopic' ? 38 : 34;

    // Generous spacing: more gap between different subtrees
    d3.tree()
        .nodeSize([58, 220])
        .separation((a, b) => {
            if (a.parent !== b.parent) return 1.6;
            const bothLeaf = !a.children && !b.children;
            return bothLeaf ? 1.1 : 1.3;
        })(root);

    // Compact: shift non-root subtrees closer to root
    root.each(d => { if (d.depth > 0) d.y = d.depth * 210; });

    const W = svgEl.clientWidth  || 800;
    const H = svgEl.clientHeight || 600;

    let xMin=Infinity, xMax=-Infinity, yMin=Infinity, yMax=-Infinity;
    root.each(d => {
        xMin = Math.min(xMin, d.x); xMax = Math.max(xMax, d.x);
        yMin = Math.min(yMin, d.y); yMax = Math.max(yMax, d.y);
    });

    const pad = 90;
    const totalH = xMax - xMin + pad * 2;
    const totalW = yMax - yMin + pad * 2 + 180;
    const scale = Math.min(W / totalW, H / totalH, 1.05) * 0.86;
    const tx = (W - totalW * scale) / 2 + (pad - yMin) * scale;
    const ty = (H - (xMax - xMin) * scale) / 2 - xMin * scale;
    const initT = d3.zoomIdentity.translate(tx, ty).scale(scale);

    // ── Defs ──
    const defs = svg.append('defs');
    const glowF = defs.append('filter').attr('id','tglow').attr('x','-30%').attr('y','-30%').attr('width','160%').attr('height','160%');
    glowF.append('feGaussianBlur').attr('stdDeviation','4').attr('result','blur');
    const fm = glowF.append('feMerge');
    fm.append('feMergeNode').attr('in','blur');
    fm.append('feMergeNode').attr('in','SourceGraphic');

    // Subtle dot-grid bg
    const pat = defs.append('pattern').attr('id','dotgrid').attr('width',28).attr('height',28).attr('patternUnits','userSpaceOnUse');
    pat.append('circle').attr('cx',1).attr('cy',1).attr('r',0.8).attr('fill','rgba(255,255,255,0.03)');
    svg.insert('rect','g').attr('width','100%').attr('height','100%').attr('fill','url(#dotgrid)');

    const g = svg.append('g');
    _treeSvgSel = svg;

    const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);
    svg.call(zoom.transform, initT);
    _treeZoom = zoom;
    _treeInitTransform = initT;
    document.getElementById('treeResetBtn').style.display = 'block';

    // ── Helpers ──
    const NW = d => d.data._type === 'root' ? 120 : d.data._type === 'subtopic' ? 130 : 144;
    const NH = d => d.data._type === 'root' ? 40  : 32;

    // ── Link path helper (extracted so drag can redraw) ──
    const linkPath = d => {
        const sx = d.source.y + NW(d.source) / 2, sy = d.source.x;
        const ex = d.target.y - NW(d.target) / 2, ey = d.target.x;
        const mx = (sx + ex) / 2;
        return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    };

    // ── Links (S-curve from right edge → left edge) ──
    // Current nav path IDs (root → current topic, all ancestors lit up)
    const pathIds = new Set(navPath.map(p => p.id));

    // Helper: is this node on the active path?
    const onPath = d => d.data._topicId != null && pathIds.has(d.data._topicId);
    const isCurrent = d => d.data._topicId === currentTopicId;
    const isChild   = d => d.data._topicId === activeChildId;

    g.selectAll('.tree-link')
        .data(root.links())
        .join('path').attr('class','tree-link')
        .attr('stroke', d => {
            // Light up link if its target is on the active path
            if (isCurrent(d.target))            return 'rgba(45,212,191,0.95)';
            if (isChild(d.target))              return 'rgba(251,191,36,0.85)';
            if (onPath(d.target))               return 'rgba(45,212,191,0.55)';
            const t = d.target.data._type;
            return t === 'subtopic' ? 'rgba(244,162,97,0.45)'
                 : t === 'subnode'  ? 'rgba(244,162,97,0.18)'
                 : 'rgba(45,212,191,0.25)';
        })
        .attr('stroke-width', d => {
            if (isCurrent(d.target) || isChild(d.target)) return 2;
            if (onPath(d.target)) return 1.5;
            return 1;
        })
        .attr('d', linkPath);

    // ── Nodes ──
    const node = g.selectAll('.tree-node')
        .data(root.descendants())
        .join('g').attr('class','tree-node')
        .attr('transform', d => `translate(${d.y},${d.x})`)
        .style('cursor', 'grab')
        .on('click', function(e, d) {
            if (d._justDragged) { d._justDragged = false; return; }
            if (d.data._type === 'root' || d.data._type === 'subtopic') {
                makeTopicMain(d.data._topicId);
                return;
            }
            showNodeDetail({ id: d.data.id, question: d.data._question || d.data._label, answer: d.data.answer || '', _topicId: d.data._topicId });
        });

    // ── Drag: long-press (180ms) to enable free-form repositioning ──
    const drag = d3.drag()
        .on('start', function(e, d) {
            d._canDrag = false;
            d._justDragged = false;
            d._holdTimer = setTimeout(() => {
                d._canDrag = true;
                d3.select(this).style('cursor', 'grabbing');
                d3.select(this).raise(); // bring to front
            }, 180);
        })
        .on('drag', function(e, d) {
            if (!d._canDrag) return;
            d.y += e.dx;
            d.x += e.dy;
            d3.select(this).attr('transform', `translate(${d.y},${d.x})`);
            g.selectAll('.tree-link').attr('d', linkPath);
            d._justDragged = true;
        })
        .on('end', function(e, d) {
            clearTimeout(d._holdTimer);
            d._canDrag = false;
            d3.select(this).style('cursor', 'grab');
        });

    node.call(drag);

    // Glow halo for current topic + root
    node.filter(d => isCurrent(d) || d.data._type === 'root')
        .append('rect')
        .attr('x', d => -NW(d)/2-6).attr('y', d => -NH(d)/2-6)
        .attr('width', d => NW(d)+12).attr('height', d => NH(d)+12)
        .attr('rx', 14)
        .attr('fill', d => isCurrent(d) ? 'rgba(45,212,191,0.15)' : 'rgba(45,212,191,0.08)')
        .attr('stroke','none')
        .attr('filter','url(#tglow)');

    // Path-ancestor halo (dimmer glow for ancestor subtopics)
    node.filter(d => onPath(d) && !isCurrent(d) && d.data._type === 'subtopic')
        .append('rect')
        .attr('x', d => -NW(d)/2-4).attr('y', d => -NH(d)/2-4)
        .attr('width', d => NW(d)+8).attr('height', d => NH(d)+8)
        .attr('rx', 12).attr('fill','rgba(45,212,191,0.07)').attr('stroke','none');

    // Background rect
    node.append('rect')
        .attr('x', d => -NW(d)/2).attr('y', d => -NH(d)/2)
        .attr('width', d => NW(d)).attr('height', d => NH(d)).attr('rx', 9)
        .attr('fill', d => {
            if (isCurrent(d))                return 'rgba(6,78,59,0.97)';
            if (isChild(d))                  return 'rgba(78,52,6,0.97)';
            if (onPath(d))                   return 'rgba(10,60,48,0.93)';
            if (d.data._type === 'root')     return 'rgba(13,96,85,0.95)';
            if (d.data._type === 'subtopic') return 'rgba(92,40,8,0.88)';
            if (d.data._type === 'subnode')  return 'rgba(30,22,16,0.92)';
            return 'rgba(22,24,38,0.95)';
        })
        .attr('stroke', d => {
            if (isCurrent(d))               return '#2dd4bf';
            if (isChild(d))                 return '#fbbf24';
            if (onPath(d))                  return 'rgba(45,212,191,0.65)';
            if (d.data._type === 'root')     return 'rgba(45,212,191,0.88)';
            if (d.data._type === 'subtopic') return 'rgba(244,162,97,0.8)';
            if (d.data._type === 'subnode')  return 'rgba(244,162,97,0.28)';
            return 'rgba(255,255,255,0.1)';
        })
        .attr('stroke-width', d => {
            if (isCurrent(d) || isChild(d)) return 2.5;
            if (onPath(d))                  return 1.8;
            return d.data._type === 'root' ? 1.5 : 1;
        });

    // Pulsing ring on current topic node ("you are here")
    node.filter(d => isCurrent(d))
        .append('rect').attr('class','tree-pulse-ring')
        .attr('x', d => -NW(d)/2 - 1).attr('y', d => -NH(d)/2 - 1)
        .attr('width', d => NW(d) + 2).attr('height', d => NH(d) + 2)
        .attr('rx', 10).attr('fill', 'none')
        .attr('stroke', 'rgba(45,212,191,0.9)').attr('stroke-width', 2.5);

    // Left accent stripe
    node.filter(d => d.data._type !== 'root')
        .append('rect')
        .attr('x', d => -NW(d)/2).attr('y', d => -NH(d)/2+5)
        .attr('width', 3).attr('height', d => NH(d)-10).attr('rx', 2)
        .attr('fill', d => d.data._type === 'subtopic' || d.data._type === 'subnode'
            ? 'rgba(244,162,97,0.7)' : 'rgba(45,212,191,0.55)');

    // Leaf indicator dot
    node.filter(d => !d.children || d.children.length === 0)
        .append('circle')
        .attr('cx', d => NW(d)/2-9).attr('cy', 0).attr('r', 3)
        .attr('fill', d => d.data._type === 'subtopic' || d.data._type === 'subnode'
            ? 'rgba(244,162,97,0.6)' : 'rgba(45,212,191,0.55)');

    // Sub-topic arrow icon
    node.filter(d => d.data._type === 'subtopic')
        .append('text')
        .attr('x', d => -NW(d)/2+14).attr('y', 0)
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-size', 11).attr('fill','rgba(244,162,97,0.8)').text('⤷');

    // Label text
    node.append('text')
        .attr('x', d => d.data._type === 'subtopic' ? 7 : 0)
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-family','Inter,sans-serif')
        .attr('font-size', d => d.data._type === 'root' ? 12.5 : 11)
        .attr('font-weight', d => d.data._type === 'root' ? 600 : 400)
        .attr('fill', d => {
            if (d.data._type === 'root')     return '#b2f5ea';
            if (d.data._type === 'subtopic') return '#fcd9b5';
            if (d.data._type === 'subnode')  return '#c8b49a';
            return '#8890a8';
        })
        .text(d => {
            const lbl = d.data._label || '';
            const max = d.data._type === 'root' ? 12 : d.data._type === 'subtopic' ? 11 : 12;
            return lbl.length > max ? lbl.slice(0, max) + '…' : lbl;
        });
}

let selectedNodeTopicId = null;

function showNodeDetail(nd) {
    selectedNodeId = nd.id;
    selectedNodeTopicId = nd.topic_id ?? nd._topicId ?? null;
    document.getElementById('nodeDetailQuestion').textContent = nd.question;
    document.getElementById('nodeDetailAnswer').innerHTML = renderMarkdown(nd.answer);
    document.getElementById('nodeDetail').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
    renderLatex(document.getElementById('nodeDetailAnswer'));
}

// ═══════════════════════ RAG SEARCH ═══════════════════════
async function searchRag() {
    const input = document.getElementById('ragInput');
    const query = input.value.trim();
    if (!query) return;
    input.value = '';
    document.getElementById('ragAnswer').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div> <span style="color:var(--text-tertiary);font-size:12px;">搜索中…</span>';
    document.getElementById('ragSources').innerHTML = '';
    document.getElementById('ragModal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
    try {
        const data = await api('/api/rag/search', 'POST', { query, topic_id: currentTopicId });
        document.getElementById('ragAnswer').innerHTML = renderMarkdown(data.answer);
        renderLatex(document.getElementById('ragAnswer'));
        if (data.results.length > 0) {
            document.getElementById('ragSources').innerHTML = '<strong>参考来源:</strong>' +
                data.results.map(r => `<div class="rag-source-item">${escapeHtml(r.metadata.question || '')}</div>`).join('');
        }
    } catch (e) {
        document.getElementById('ragAnswer').textContent = '搜索失败: ' + e.message;
    }
}

// ═══════════════════════ SETTINGS ═══════════════════════
async function openSettings() {
    try {
        const s = await api('/api/settings');
        document.getElementById('settingsProvider').value = s.api_provider || 'openai';
        document.getElementById('settingsBaseUrl').value = s.api_base_url || '';
        document.getElementById('settingsBaseUrl').placeholder = s.effective_base_url || 'https://api.openai.com/v1';
        document.getElementById('settingsApiKey').value = '';
        document.getElementById('settingsApiKey').placeholder = s.has_custom_key ? s.api_key : (s.has_env_key ? '已配置环境变量' : '未配置');
        document.getElementById('settingsModel').value = s.api_model || '';
        document.getElementById('settingsModel').placeholder = s.effective_model || 'gpt-4o';
        document.getElementById('settingsKeyHint').textContent = s.has_custom_key ? '已设置自定义 Key，留空保持不变' : (s.has_env_key ? '环境已配置，留空使用环境值' : '留空则使用环境默认值');
    } catch {}
    document.getElementById('settingsModal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

function onProviderChange() {
    const p = document.getElementById('settingsProvider').value;
    document.getElementById('settingsBaseUrl').placeholder = p === 'claude' ? 'https://api.anthropic.com/v1' : 'https://api.openai.com/v1';
    document.getElementById('settingsModel').placeholder = p === 'claude' ? 'claude-sonnet-4-20250514' : 'gpt-4o';
}

async function saveSettings() {
    const status = document.getElementById('settingsStatus');
    try {
        await api('/api/settings', 'POST', {
            api_provider: document.getElementById('settingsProvider').value,
            api_base_url: document.getElementById('settingsBaseUrl').value.trim(),
            api_key: document.getElementById('settingsApiKey').value.trim(),
            api_model: document.getElementById('settingsModel').value.trim(),
        });
        status.textContent = '已保存'; status.className = 'settings-status success';
        setTimeout(() => { status.textContent = ''; }, 2000);
    } catch (e) {
        status.textContent = '保存失败: ' + e.message; status.className = 'settings-status error';
    }
}

async function resetSettings() {
    if (!confirm('确定恢复为环境默认配置？')) return;
    const status = document.getElementById('settingsStatus');
    try {
        await api('/api/settings/reset', 'POST');
        status.textContent = '已恢复默认'; status.className = 'settings-status success';
        ['settingsBaseUrl','settingsApiKey','settingsModel'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('settingsProvider').value = 'openai';
        setTimeout(() => { status.textContent = ''; }, 2000);
    } catch (e) {
        status.textContent = '重置失败: ' + e.message; status.className = 'settings-status error';
    }
}

function closeModals() {
    ['nodeDetail','ragModal','settingsModal'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('overlay').style.display = 'none';
}

// ═══════════════════════ TEXTAREA SETUP (auto-resize + IME-safe Enter) ═══════════════════════
[
    { id: 'questionInput',  action: () => askQuestion() },
    { id: 'subPanelInput',  action: () => askInSubPanel() },
    { id: 'newTopicInput',  action: () => createTopic(), isInput: true },
].forEach(({ id, action, isInput }) => {
    const el = document.getElementById(id);
    if (!el) return;

    // Auto-resize (only for textareas, not plain inputs)
    if (!isInput) {
        el.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
        });
    }

    // IME-safe Enter: track composition state
    let composing = false;
    el.addEventListener('compositionstart', () => { composing = true; });
    el.addEventListener('compositionend',   () => { composing = false; });

    el.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && !composing) {
            e.preventDefault();
            action();
        }
    });
});

// ═══════════════════════ PANEL RESIZE ═══════════════════════
(function initPanelResize() {
    const handle   = document.getElementById('panelResizeHandle');
    const subPanel = document.getElementById('subPanel');
    const MIN_W = 220, MAX_W = 720;

    // Restore saved width
    const saved = localStorage.getItem('subPanelWidth');
    if (saved) subPanel.style.width = saved + 'px';

    let dragging = false, startX = 0, startW = 0;

    handle.addEventListener('mousedown', e => {
        dragging = true;
        startX = e.clientX;
        startW = subPanel.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor    = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const delta  = startX - e.clientX;          // drag left = sub-panel grows
        const newW   = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
        subPanel.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor     = '';
        document.body.style.userSelect = '';
        localStorage.setItem('subPanelWidth', subPanel.offsetWidth);
    });
})();
